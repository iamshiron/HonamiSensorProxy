name: Build APK

# Build a signed release APK. On a version tag (e.g. v0.1.0) it publishes a GitHub Release with
# the APK attached, so users can download & install it directly. Also runnable on demand.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create Releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 21 (Azul Zulu) to match gradle/gradle-daemon-jvm.properties.
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.HSP_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          HSP_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          HSP_KEYSTORE_PASSWORD: ${{ secrets.HSP_KEYSTORE_PASSWORD }}
          HSP_KEY_ALIAS: ${{ secrets.HSP_KEY_ALIAS }}
          HSP_KEY_PASSWORD: ${{ secrets.HSP_KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --stacktrace

      - name: Stage APK
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          cp androidApp/build/outputs/apk/release/androidApp-release.apk \
             "dist/HonamiSensorProxy-${VERSION}.apk"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: HonamiSensorProxy-apk
          path: dist/*.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          body: |
            **Honami Sensor Proxy** — install by downloading the `.apk` below.

            On your phone: enable *Install unknown apps* for your browser/file manager,
            then open the downloaded APK to install. Requires Android 8.0 (API 26)+.
